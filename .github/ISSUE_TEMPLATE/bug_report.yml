name: Bug report
description: Report a reproducible LocalTube Dub problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include API keys, cookies, private captions, captured audio, or security exploit details.
  - type: input
    id: version
    attributes:
      label: LocalTube Dub version
      placeholder: 0.1.95
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: dropdown
    id: engine
    attributes:
      label: Companion Engine
      options:
        - Installed and healthy
        - Installed but unavailable
        - Not installed
        - Unsure
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use a public test video when possible and remove private data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
