<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LocalTube Dub Voice Picker Harness</title>
    <style>
      body { margin: 0; padding: 28px; background: #15181e; color: #eef4ff; font: 16px/1.5 system-ui, sans-serif; }
      main { max-width: 680px; margin: 0 auto; }
      label { display: grid; gap: 8px; margin: 18px 0; }
      select { min-height: 44px; padding: 0 12px; border: 1px solid #536174; border-radius: 6px; background: #202630; color: inherit; }
      output { display: block; min-height: 120px; padding: 16px; background: #0d1117; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <main>
      <h1>本机配音音色发现测试</h1>
      <label>目标语言
        <select data-target-language>
          <option value="zh-CN">中文（简体）</option>
          <option value="en-US">English</option>
          <option value="ja-JP">日本語</option>
        </select>
      </label>
      <label>实际可用音色
        <select data-voice></select>
      </label>
      <output data-status role="status">正在读取 Engine 音色...</output>
    </main>
    <script src="../extension/voice_helpers.js"></script>
    <script src="./voice_picker_harness.js"></script>
  </body>
</html>
